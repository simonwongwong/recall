<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Recall · Stats</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<link rel="icon" type="image/svg+xml" href="/recall-icon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/recall-icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/recall-icon-16.png">
<link rel="apple-touch-icon" href="/recall-icon-180.png">
<style>
  html, body { margin: 0; padding: 0; min-height: 100%; background: var(--bg); font-family: var(--font-ui); color: var(--ink); }
  .stats-wrap { max-width: 1080px; margin: 0 auto; padding: 28px 28px 80px; }
  .stats-back { display: inline-flex; align-items: center; gap: 6px; color: var(--ink-3); text-decoration: none; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.02em; }
  .stats-back:hover { color: var(--ink); }
  .stats-h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.015em; margin: 14px 0 4px; display: flex; align-items: center; gap: 12px; }
  .stats-sub { font-family: var(--font-mono); font-size: 12px; color: var(--ink-3); margin-bottom: 28px; }

  /* Chat picker — sits next to the Stats h1 */
  .chat-picker { position: relative; }
  .chat-picker-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 12px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 999px;
    font-family: var(--font-mono); font-size: 12px;
    color: var(--ink-2);
    cursor: pointer;
    transition: all 0.12s;
  }
  .chat-picker-btn:hover { background: white; border-color: var(--line-2); color: var(--ink); }
  .chat-picker-btn.active { background: var(--accent-2); border-color: var(--accent); color: var(--accent-ink); }
  .chat-picker-pop {
    position: absolute; top: calc(100% + 6px); left: 0;
    width: 320px; max-height: 420px;
    background: white;
    border: 1px solid var(--line-2);
    border-radius: 10px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.12);
    z-index: 50;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .chat-picker-pop input {
    border: none; outline: none; background: transparent;
    padding: 12px 14px;
    font: inherit; font-size: 13px;
    border-bottom: 1px solid var(--line);
  }
  .chat-picker-list { flex: 1; min-height: 0; overflow-y: auto; padding: 4px; }
  .chat-picker-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 10px; border-radius: 6px;
    cursor: pointer;
    font-size: 13px; color: var(--ink-2);
  }
  .chat-picker-item:hover { background: var(--accent-2); color: var(--accent-ink); }
  .chat-picker-item.selected { background: var(--accent-2); color: var(--accent-ink); font-weight: 500; }
  .chat-picker-item .meta { margin-left: auto; font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-4); }
  .chat-picker-item.selected .meta { color: var(--accent-ink); opacity: 0.7; }
  .grid { display: grid; gap: 14px; }
  .grid-4 { grid-template-columns: repeat(4, 1fr); }
  .grid-3 { grid-template-columns: repeat(3, 1fr); }
  .grid-2 { grid-template-columns: 1fr 1fr; }
  .card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 18px 20px; transition: border 0.12s; }
  a.card:hover { border-color: var(--accent); }
  .card h3 { margin: 0 0 4px; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-4); }
  .card .big { font-size: 26px; font-weight: 600; letter-spacing: -0.015em; line-height: 1.15; font-variant-numeric: tabular-nums; }
  .card .sub { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); margin-top: 4px; }
  .section { margin-top: 28px; }
  .section-title { font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-3); margin: 0 0 12px 2px; display: flex; align-items: center; gap: 12px; }
  .chart-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 18px 20px; }
  .row-list { display: flex; flex-direction: column; }
  .row-list-item { display: grid; grid-template-columns: 1fr auto; gap: 12px; padding: 7px 0; border-bottom: 1px dashed var(--line); align-items: baseline; }
  .row-list-item:last-child { border-bottom: none; }
  .row-list-name { font-size: 13px; color: var(--ink-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row-list-meta { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); white-space: nowrap; font-variant-numeric: tabular-nums; }
  .bar-row { display: grid; grid-template-columns: 160px 1fr 70px; gap: 10px; align-items: center; padding: 5px 0; font-size: 12.5px; }
  .bar-row .name { color: var(--ink-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bar-row .count { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); text-align: right; font-variant-numeric: tabular-nums; }
  .bar-track { height: 18px; background: var(--surface-2); border-radius: 3px; position: relative; overflow: hidden; }
  .bar-fill { position: absolute; left: 0; top: 0; bottom: 0; background: var(--accent); border-radius: 3px; }
  .bar-fill.split-them { background: var(--bubble-in); }
  .bar-fill.split-me { background: var(--accent); }
  .legend { display: inline-flex; gap: 14px; align-items: center; font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); margin-left: 10px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; display: inline-block; margin-right: 5px; vertical-align: middle; }
  .quote-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px 20px; }
  .quote-text { font-size: 13.5px; color: var(--ink); line-height: 1.55; max-height: 220px; overflow: auto; white-space: pre-wrap; }
  .quote-meta { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); margin-top: 10px; display: flex; justify-content: space-between; }
  .quote-card + .quote-card { margin-top: 10px; }
  .loading { text-align: center; padding: 80px; color: var(--ink-4); font-family: var(--font-mono); font-size: 12px; }

  /* Pagination row */
  .pager { display: flex; justify-content: center; gap: 8px; margin-top: 12px; }
  .pager-btn {
    font-family: var(--font-mono); font-size: 11px; color: var(--ink-3);
    background: var(--surface); border: 1px solid var(--line); border-radius: 6px;
    padding: 5px 12px; cursor: pointer; transition: all 0.12s;
  }
  .pager-btn:hover:not(:disabled) { background: white; color: var(--ink); border-color: var(--line-2); }
  .pager-btn:disabled { opacity: 0.4; cursor: default; }
  .pager-status { font-family: var(--font-mono); font-size: 11px; color: var(--ink-4); align-self: center; }

  /* Sticker grid */
  .sticker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
  .sticker-card {
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    transition: border 0.12s;
  }
  .sticker-card:hover { border-color: var(--line-2); }
  .sticker-img {
    width: 96px; height: 96px;
    object-fit: contain;
    /* No background or border — transparent regions inherit the card's surface. */
  }
  .sticker-meta {
    font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-3);
    text-align: center; line-height: 1.5;
    font-variant-numeric: tabular-nums;
  }
  .sticker-meta strong { color: var(--ink); font-weight: 600; }

  /* Emoji grid */
  .emoji-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 6px 16px; }
  .emoji-row {
    display: grid;
    grid-template-columns: 28px 1fr 70px;
    gap: 8px; align-items: center;
    padding: 4px 0;
    font-size: 13px;
  }
  .emoji-row .glyph {
    font-size: 22px; line-height: 1; text-align: center;
    font-family: "Apple Color Emoji", "Segoe UI Emoji", sans-serif;
  }
  .emoji-row .count { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); text-align: right; font-variant-numeric: tabular-nums; }
  .emoji-row .bar-track { height: 6px; }

  /* Tapback strip */
  .tapback-strip { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .tapback-card {
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px 8px;
    text-align: center;
  }
  .tapback-emoji { font-size: 26px; line-height: 1.3; font-family: "Apple Color Emoji", sans-serif; }
  .tapback-label { font-family: var(--font-mono); font-size: 9.5px; color: var(--ink-4); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px; }
  .tapback-uses { font-size: 18px; font-weight: 600; margin-top: 4px; font-variant-numeric: tabular-nums; }
  .tapback-split { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); margin-top: 2px; font-variant-numeric: tabular-nums; }

  /* HTML bar charts (VBarChart + SplitBarChart) */
  .vchart {
    display: flex; gap: 10px;
    width: 100%;
  }
  .vchart-yaxis {
    width: 32px; position: relative; flex-shrink: 0;
  }
  .vchart-yaxis span {
    position: absolute; right: 0;
    font-family: var(--font-mono); font-size: 10px; color: var(--ink-4);
    font-variant-numeric: tabular-nums;
    line-height: 12px;
  }
  .vchart-area {
    flex: 1; min-width: 0;
    display: flex; flex-direction: column;
    position: relative;
  }
  .vchart-grid {
    position: absolute; inset: 0 0 22px 0;
    pointer-events: none;
  }
  .vchart-gridline {
    position: absolute; left: 0; right: 0;
    border-top: 1px dashed var(--line);
    height: 0;
  }
  .vchart-bars {
    flex: 1; min-height: 0;
    display: flex; align-items: flex-end; gap: 4px;
    border-bottom: 1px solid var(--line);
    position: relative;
  }
  .vchart-col {
    flex: 1; min-width: 0; height: 100%;
    display: flex; flex-direction: column; justify-content: flex-end;
  }
  .vchart-stack {
    width: 100%;
    display: flex; flex-direction: column-reverse;
    border-radius: 3px 3px 0 0;
    overflow: hidden;
  }
  .vchart-bar {
    width: 100%;
    transition: opacity 0.12s;
  }
  .vchart-col:hover .vchart-bar { opacity: 0.85; }
  .vchart-xaxis {
    display: flex; gap: 4px; padding-top: 6px; height: 16px;
    font-family: var(--font-mono); font-size: 10px; color: var(--ink-4);
  }
  .vchart-xaxis span {
    flex: 1; min-width: 0; text-align: center;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* Year × Month heatmap */
  .heatmap { display: flex; flex-direction: column; gap: 4px; font-family: var(--font-mono); }
  .heatmap-header, .heatmap-row {
    display: grid;
    grid-template-columns: 50px repeat(12, 1fr) 60px;
    gap: 4px;
    align-items: center;
  }
  .heatmap-corner { width: 50px; }
  .heatmap-col-label { text-align: center; font-size: 10px; color: var(--ink-4); padding: 0 0 4px; }
  .heatmap-row-label { text-align: right; font-size: 11px; color: var(--ink-3); padding-right: 6px; }
  .heatmap-cell {
    aspect-ratio: 1.4;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 9.5px;
    transition: transform 0.1s;
  }
  .heatmap-cell:hover { transform: scale(1.04); }
  .heatmap-row-total { font-size: 11px; color: var(--ink-3); text-align: right; font-variant-numeric: tabular-nums; }

  /* Segment control (for direction toggle) */
  .seg { display: inline-flex; background: var(--surface-2); border: 1px solid var(--line); border-radius: 6px; padding: 2px; }
  .seg button {
    font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-3);
    background: transparent; border: none; padding: 4px 10px; border-radius: 4px;
    cursor: pointer; transition: all 0.12s; letter-spacing: 0.02em;
  }
  .seg button.active { background: var(--surface); color: var(--ink); box-shadow: 0 0 0 1px var(--line); }
  .seg button:hover:not(.active) { color: var(--ink-2); }
</style>
</head>
<body>
<div id="root" class="stats-wrap"><div class="loading">loading stats…</div></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

function fmtN(n) { return (n || 0).toLocaleString(); }
function fmtDate(unix) {
  if (!unix) return "—";
  return new Date(unix * 1000).toLocaleDateString("en-US", { year: "numeric", month: "short", day: "numeric" });
}
function fmtIsoDay(s) {
  if (!s) return "—";
  return new Date(s + "T00:00:00").toLocaleDateString("en-US", { weekday: "short", year: "numeric", month: "short", day: "numeric" });
}
function daysBetween(a, b) {
  if (!a || !b) return 0;
  return Math.round((b - a) / 86400);
}

// "Nice" round upper bound + tick step for axis labels
function niceScale(rawMax, ticks = 4) {
  if (rawMax <= 0) return { max: 1, step: 1, ticks: [0, 1] };
  const exp = Math.floor(Math.log10(rawMax / ticks));
  const base = Math.pow(10, exp);
  const candidates = [1, 2, 2.5, 5, 10];
  let step = base;
  for (const c of candidates) {
    if (c * base * ticks >= rawMax) { step = c * base; break; }
  }
  const max = step * ticks;
  return { max, step, ticks: Array.from({ length: ticks + 1 }, (_, i) => i * step) };
}
function fmtTick(v) {
  if (v === 0) return "0";
  if (v >= 1000) return (v / 1000).toFixed(v >= 10000 ? 0 : 1) + "k";
  return String(v);
}

// ── HTML bar chart (categorical) ─────────────────────────────
// HTML+flexbox so the chart fills its container's width fully and labels
// stay at a fixed pixel size regardless of container width.
function VBarChart({ data, labels, height = 220, accent = "var(--accent)" }) {
  const scale = niceScale(Math.max(1, ...data), 4);
  return (
    <div className="vchart" style={{ height }}>
      <div className="vchart-yaxis">
        {scale.ticks.map((t, i) => (
          <span key={i} style={{ bottom: `calc(${(t / scale.max) * 100}% - 6px)` }}>{fmtTick(t)}</span>
        ))}
      </div>
      <div className="vchart-area">
        <div className="vchart-grid">
          {scale.ticks.map((t, i) => (
            <div key={i} className="vchart-gridline" style={{ bottom: `${(t / scale.max) * 100}%` }}/>
          ))}
        </div>
        <div className="vchart-bars">
          {data.map((v, i) => (
            <div key={i} className="vchart-col">
              <div className="vchart-bar" style={{
                height: `${(v / scale.max) * 100}%`,
                background: accent,
              }} title={`${labels?.[i] ?? i}: ${fmtN(v)}`}/>
            </div>
          ))}
        </div>
        {labels && (
          <div className="vchart-xaxis">
            {labels.map((l, i) => <span key={i}>{l}</span>)}
          </div>
        )}
      </div>
    </div>
  );
}

// ── Monthly area chart with split (you vs received) ──────────
function TimelineChart({ buckets, height = 220, xLabelEvery = "auto" }) {
  const w = 880, pad = { l: 40, r: 12, t: 12, b: 28 };
  const max = Math.max(1, ...buckets.map(m => m.n));
  const innerW = w - pad.l - pad.r;
  const innerH = height - pad.t - pad.b;
  const x = i => pad.l + (i / Math.max(1, buckets.length - 1)) * innerW;
  const y = v => pad.t + innerH - (v / max) * innerH;

  const ticks = 4;
  const tickVals = Array.from({ length: ticks + 1 }, (_, i) => Math.round((max * i) / ticks));
  const totalPath = "M " + buckets.map((m, i) => `${x(i)} ${y(m.n)}`).join(" L ");
  const totalArea = totalPath + ` L ${x(buckets.length - 1)} ${pad.t + innerH} L ${x(0)} ${pad.t + innerH} Z`;
  const mePath    = "M " + buckets.map((m, i) => `${x(i)} ${y(m.me || 0)}`).join(" L ");
  const meArea    = mePath + ` L ${x(buckets.length - 1)} ${pad.t + innerH} L ${x(0)} ${pad.t + innerH} Z`;

  const step = xLabelEvery === "auto" ? Math.max(1, Math.round(buckets.length / 8)) : xLabelEvery;
  return (
    <svg viewBox={`0 0 ${w} ${height}`} width="100%" preserveAspectRatio="xMidYMid meet" style={{ display: "block" }}>
      {tickVals.map((v, i) => (
        <g key={i}>
          <line x1={pad.l} x2={w - pad.r} y1={y(v)} y2={y(v)} stroke="var(--line)" strokeDasharray="2 4"/>
          <text x={pad.l - 6} y={y(v) + 3} fill="var(--ink-4)" fontFamily="var(--font-mono)" fontSize="10" textAnchor="end">
            {v >= 1000 ? (v/1000).toFixed(v >= 10000 ? 0 : 1) + "k" : v}
          </text>
        </g>
      ))}
      <path d={totalArea} fill="var(--bubble-in)" opacity="0.85"/>
      <path d={meArea}    fill="var(--accent)"   opacity="0.9"/>
      <path d={totalPath} fill="none" stroke="var(--ink-2)" strokeWidth="0.8"/>
      {buckets.map((m, i) => i % step === 0 && (
        <text key={i} x={x(i)} y={height - 8} fill="var(--ink-4)"
              fontFamily="var(--font-mono)" fontSize="10" textAnchor="middle">
          {m.bucket}
        </text>
      ))}
    </svg>
  );
}

// ── HTML solid bar chart (single color; me/them in tooltip) ──
// Used where the split is interesting context but visual stacking adds noise
// (e.g. by year, by calendar month).
function SplitBarChart({ data, labels, height = 220 }) {
  const scale = niceScale(Math.max(1, ...data.map(d => d.n)), 4);
  return (
    <div className="vchart" style={{ height }}>
      <div className="vchart-yaxis">
        {scale.ticks.map((t, i) => (
          <span key={i} style={{ bottom: `calc(${(t / scale.max) * 100}% - 6px)` }}>{fmtTick(t)}</span>
        ))}
      </div>
      <div className="vchart-area">
        <div className="vchart-grid">
          {scale.ticks.map((t, i) => (
            <div key={i} className="vchart-gridline" style={{ bottom: `${(t / scale.max) * 100}%` }}/>
          ))}
        </div>
        <div className="vchart-bars">
          {data.map((d, i) => {
            const total = d.n;
            const me    = d.me || 0;
            const them  = total - me;
            return (
              <div key={i} className="vchart-col"
                   title={`${labels?.[i] ?? i}: ${fmtN(total)} total · ${fmtN(me)} sent · ${fmtN(them)} received`}>
                <div className="vchart-bar" style={{
                  height: `${(total / scale.max) * 100}%`,
                  background: "var(--accent)",
                  borderRadius: "3px 3px 0 0",
                }}/>
              </div>
            );
          })}
        </div>
        {labels && (
          <div className="vchart-xaxis">
            {labels.map((l, i) => <span key={i}>{l}</span>)}
          </div>
        )}
      </div>
    </div>
  );
}

// ── Year × Month heatmap ─────────────────────────────────────
function YearMonthHeatmap({ buckets }) {
  // buckets: [{bucket: "YYYY-MM", n, me}, ...]
  const yearMap = {};
  buckets.forEach(b => {
    const [y, m] = b.bucket.split("-").map(Number);
    if (!yearMap[y]) yearMap[y] = {};
    yearMap[y][m] = b;
  });
  const years = Object.keys(yearMap).map(Number).sort((a, b) => a - b);
  const max = Math.max(1, ...buckets.map(b => b.n));
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  function colorFor(n) {
    if (!n) return "var(--surface-2)";
    const t = Math.min(1, Math.max(0.06, n / max));
    return `rgba(42, 58, 138, ${t.toFixed(3)})`;  // var(--accent) at variable opacity
  }

  return (
    <div className="heatmap">
      <div className="heatmap-header">
        <div className="heatmap-corner"></div>
        {months.map(m => <div key={m} className="heatmap-col-label">{m}</div>)}
        <div className="heatmap-row-total">total</div>
      </div>
      {years.map(y => {
        const yearTotal = Object.values(yearMap[y]).reduce((s, b) => s + b.n, 0);
        return (
          <div key={y} className="heatmap-row">
            <div className="heatmap-row-label">{y}</div>
            {months.map((_, i) => {
              const b = yearMap[y][i + 1];
              const n = b?.n || 0;
              return (
                <div key={i} className="heatmap-cell"
                     title={`${y}-${String(i+1).padStart(2,"0")}: ${fmtN(n)} messages${b ? ` (${fmtN(b.me)} from you)` : ""}`}
                     style={{ background: colorFor(n) }}>
                  <span style={{ color: n > max * 0.55 ? "white" : "var(--ink-3)" }}>
                    {n ? fmtTick(n) : ""}
                  </span>
                </div>
              );
            })}
            <div className="heatmap-row-total mono">{fmtN(yearTotal)}</div>
          </div>
        );
      })}
    </div>
  );
}

// ── Pager ────────────────────────────────────────────────────
function Pager({ offset, limit, total, onChange, loading }) {
  const start = offset + 1;
  const end = Math.min(offset + limit, total);
  const canPrev = offset > 0;
  const canNext = offset + limit < total;
  return (
    <div className="pager">
      <button className="pager-btn" disabled={!canPrev || loading} onClick={() => onChange(Math.max(0, offset - limit))}>← prev</button>
      <span className="pager-status">{total ? `${start}–${end} of ${fmtN(total)}` : "—"}</span>
      <button className="pager-btn" disabled={!canNext || loading} onClick={() => onChange(offset + limit)}>next →</button>
    </div>
  );
}

// ── Chat scope context (shared chat_ids filter) ──────────────
const ChatScope = React.createContext({ chatIds: [], scopeLabel: "All chats" });

// ── Hooks for paginated sections ─────────────────────────────
function useStatsList(path, limit, extraQuery) {
  const { chatIds } = React.useContext(ChatScope);
  const [offset, setOffset] = useState(0);
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);
  const chatIdsKey = chatIds.join(",");
  const url = useMemo(() => {
    const u = new URLSearchParams({ limit, offset });
    Object.entries(extraQuery || {}).forEach(([k, v]) => u.set(k, v));
    if (chatIdsKey) u.set("chat_ids", chatIdsKey);
    return `${path}?${u}`;
  }, [path, limit, offset, JSON.stringify(extraQuery), chatIdsKey]);
  useEffect(() => {
    let cancelled = false;
    setLoading(true);
    fetch(url).then(r => r.json()).then(d => { if (!cancelled) { setData(d); setLoading(false); } })
      .catch(() => { if (!cancelled) setLoading(false); });
    return () => { cancelled = true; };
  }, [url]);
  // Reset offset when filter scope or extra query changes.
  useEffect(() => { setOffset(0); }, [JSON.stringify(extraQuery), chatIdsKey]);
  return { data, offset, setOffset, loading, limit };
}

// ── Chat picker ──────────────────────────────────────────────
function ChatPicker({ scope, onChange }) {
  const [open, setOpen] = useState(false);
  const [people, setPeople] = useState([]);
  const [filter, setFilter] = useState("");
  const ref = React.useRef(null);

  useEffect(() => {
    if (!open || people.length) return;
    fetch("/people?limit=2000").then(r => r.json()).then(d => setPeople(d.people || []));
  }, [open]);

  useEffect(() => {
    if (!open) return;
    function onDoc(e) { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }
    document.addEventListener("mousedown", onDoc);
    return () => document.removeEventListener("mousedown", onDoc);
  }, [open]);

  const f = filter.trim().toLowerCase();
  const filtered = f
    ? people.filter(p => (p.name || "").toLowerCase().includes(f))
    : people.slice(0, 80);

  const isAll = scope.chatIds.length === 0;

  return (
    <div className="chat-picker" ref={ref}>
      <button className={"chat-picker-btn" + (isAll ? "" : " active")}
              onClick={() => setOpen(o => !o)}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
          <path d="M21 11.5a8.4 8.4 0 0 1-9 8.4 8.5 8.5 0 0 1-3.4-.7L3 21l1.8-5.6A8.4 8.4 0 1 1 21 11.5z"/>
        </svg>
        <span>{scope.scopeLabel}</span>
        <span style={{ opacity: 0.6 }}>▾</span>
      </button>
      {open && (
        <div className="chat-picker-pop">
          <input value={filter} onChange={e => setFilter(e.target.value)} placeholder="Filter…" autoFocus/>
          <div className="chat-picker-list">
            <div className={"chat-picker-item" + (isAll ? " selected" : "")}
                 onClick={() => { onChange({ chatIds: [], scopeLabel: "All chats" }); setOpen(false); }}>
              <span>All chats</span>
            </div>
            {filtered.map(p => {
              const selected = scope.chatIds.length === p.chat_ids.length
                && scope.chatIds.every(id => p.chat_ids.includes(id));
              const label = p.is_group ? `${p.name} · group` : p.name;
              return (
                <div key={p.chat_ids.join(",")}
                     className={"chat-picker-item" + (selected ? " selected" : "")}
                     onClick={() => {
                       onChange({
                         chatIds: p.chat_ids,
                         scopeLabel: label,
                         identifiers: p.identifiers || [],
                         isGroup: !!p.is_group,
                       });
                       setOpen(false);
                     }}>
                  <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{label}</span>
                  <span className="meta">{(p.message_count || 0).toLocaleString()}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ── Main app ─────────────────────────────────────────────────
function App() {
  const [data, setData] = useState(null);
  const [err, setErr] = useState(null);
  // Initial scope from URL — full label/identifiers fill in once /people loads.
  const initialChatIds = (new URLSearchParams(window.location.search).get("chat_ids") || "")
    .split(",").map(s => s.trim()).filter(Boolean).map(Number);
  const [scope, setScope] = useState(
    initialChatIds.length
      ? { chatIds: initialChatIds, scopeLabel: "Loading…", identifiers: [], isGroup: false }
      : { chatIds: [], scopeLabel: "All chats", identifiers: [], isGroup: false }
  );
  const scopeKey = scope.chatIds.join(",");

  // Resolve a deep-linked chat scope to a full label by hitting /people once.
  useEffect(() => {
    if (!initialChatIds.length || scope.scopeLabel !== "Loading…") return;
    fetch("/people?limit=2000").then(r => r.json()).then(d => {
      const match = (d.people || []).find(p =>
        p.chat_ids.length === initialChatIds.length
        && initialChatIds.every(id => p.chat_ids.includes(id))
      );
      if (match) {
        setScope({
          chatIds: match.chat_ids,
          scopeLabel: match.is_group ? `${match.name} · group` : match.name,
          identifiers: match.identifiers || [],
          isGroup: !!match.is_group,
        });
      } else {
        setScope(s => ({ ...s, scopeLabel: `${initialChatIds.length} chat${initialChatIds.length !== 1 ? "s" : ""}` }));
      }
    });
  }, []);

  // Mirror scope into the URL so refresh/share keeps the chat selection.
  useEffect(() => {
    const u = new URL(window.location);
    if (scopeKey) u.searchParams.set("chat_ids", scopeKey);
    else u.searchParams.delete("chat_ids");
    window.history.replaceState({}, "", u);
  }, [scopeKey]);

  useEffect(() => {
    setData(null);
    const u = scopeKey ? `/stats?chat_ids=${scopeKey}` : "/stats";
    fetch(u).then(r => r.json()).then(setData).catch(e => setErr(String(e)));
  }, [scopeKey]);

  if (err) return <div className="loading">{err}</div>;
  if (!data) return (
    <>
      <a href="/" className="stats-back">← back to search</a>
      <h1 className="stats-h1">Stats <ChatPicker scope={scope} onChange={setScope}/></h1>
      <div className="loading">loading stats…</div>
    </>
  );

  const ov = data.overview;
  const span = daysBetween(ov.first_unix, ov.last_unix);
  const avgPerDay = span > 0 ? Math.round(ov.total_messages / span) : 0;
  const mePct = ov.total_messages ? Math.round((ov.from_me / ov.total_messages) * 100) : 0;

  const peakHour = [...data.by_hour].sort((a, b) => b.n - a.n)[0];
  const topWeekday = [...data.by_weekday].sort((a, b) => b.n - a.n)[0];
  const peakMonth = [...data.by_month_of_year].sort((a, b) => b.n - a.n)[0];

  return (
    <ChatScope.Provider value={scope}>
      <a href="/" className="stats-back">← back to search</a>
      <h1 className="stats-h1">
        Stats <ChatPicker scope={scope} onChange={setScope}/>
      </h1>
      <div className="stats-sub">
        {fmtDate(ov.first_unix)} → {fmtDate(ov.last_unix)} · {fmtN(span)} days
      </div>

      {/* Top tiles */}
      <div className="grid grid-4">
        <div className="card">
          <h3>messages</h3>
          <div className="big">{fmtN(ov.total_messages)}</div>
          <div className="sub">{fmtN(ov.from_me)} sent · {fmtN(ov.received)} received</div>
        </div>
        {scope.chatIds.length === 0 ? (
          <div className="card">
            <h3>conversations</h3>
            <div className="big">{fmtN(ov.total_chats)}</div>
            <div className="sub">{fmtN(ov.one_on_one_chats)} 1:1 · {fmtN(ov.group_chats)} groups</div>
          </div>
        ) : scope.isGroup ? (
          <div className="card">
            <h3>group chat</h3>
            <div className="big">{scope.scopeLabel.replace(/ · group$/, "")}</div>
            <div className="sub" style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
              {scope.identifiers[0]}
            </div>
          </div>
        ) : (
          <div className="card">
            <h3>contact points</h3>
            <div className="big">{(scope.identifiers || []).length}</div>
            <div className="sub" style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}
                 title={(scope.identifiers || []).join(" · ")}>
              {(scope.identifiers || []).join(" · ")}
            </div>
          </div>
        )}
        <div className="card">
          <h3>avg / day</h3>
          <div className="big">{fmtN(avgPerDay)}</div>
          <div className="sub">{mePct}% are from you</div>
        </div>
        {(() => {
          const s = data.streaks;
          const start = s.longest_start;
          const end = s.longest_end;
          // Link to the search page filtered to this streak's date range
          // (and the current chat scope, if any), oldest first so the very
          // first message of the streak is the auto-selected hit.
          const u = new URLSearchParams();
          if (start) u.set("since", start);
          if (end)   {
            // Use the day after `end` since `until` is exclusive in /search.
            const next = new Date(end + "T00:00:00");
            next.setDate(next.getDate() + 1);
            u.set("until", next.toISOString().slice(0, 10));
          }
          if (scope.chatIds.length) u.set("chat_ids", scope.chatIds.join(","));
          u.set("order", "oldest");
          const href = `/?${u}`;
          return (
            <a className="card" href={href} target="_blank" rel="noreferrer"
               style={{ display: "block", color: "inherit", textDecoration: "none", cursor: "pointer" }}
               title="Open the first message of the streak in search">
              <h3>longest streak</h3>
              <div className="big">{fmtN(s.longest)}d <span style={{ fontSize: 14, color: "var(--ink-4)", fontWeight: 400 }}>↗</span></div>
              <div className="sub">{start} → {end}</div>
            </a>
          );
        })()}
      </div>

      {/* Year-month timeline */}
      <div className="section">
        <h2 className="section-title">
          messages over time · by month
          <span className="legend">
            <span><span className="legend-dot" style={{ background: "var(--bubble-in)" }}/>received</span>
            <span><span className="legend-dot" style={{ background: "var(--accent)" }}/>from you</span>
          </span>
        </h2>
        <div className="chart-card">
          <TimelineChart buckets={data.by_month}/>
        </div>
      </div>

      {/* Year × Month heatmap */}
      <div className="section">
        <h2 className="section-title">year × month heatmap</h2>
        <div className="chart-card">
          <YearMonthHeatmap buckets={data.by_month}/>
        </div>
      </div>

      {/* Year + month-of-year */}
      <div className="section grid grid-2">
        <div>
          <h2 className="section-title">by year</h2>
          <div className="chart-card">
            <SplitBarChart data={data.by_year} labels={data.by_year.map(d => d.bucket)}/>
          </div>
        </div>
        <div>
          <h2 className="section-title">by calendar month · busiest {peakMonth?.label}</h2>
          <div className="chart-card">
            <SplitBarChart data={data.by_month_of_year} labels={data.by_month_of_year.map(d => d.label)}/>
          </div>
        </div>
      </div>

      {/* Hour & weekday */}
      <div className="section grid grid-2">

          <h2 className="section-title">by hour of day · peak {peakHour?.h}:00</h2>
          <div className="chart-card">
            <SplitBarChart
              data={data.by_hour}
              labels={data.by_hour.map(h => h.h % 3 === 0 ? `${h.h}` : "")}

          </div>

                <div className="row-list-name">
                  <span style={{ color: "var(--ink)" }}>{m.is_from_me ? "you → " : ""}{m.chat_name || m.handle || "?"}</span>
                  <span style={{ color: "var(--ink-3)" }}> · “{m.text.slice(0, 80).replace(/\n/g, " ")}{m.text.length > 80 ? "…" : ""}”</span>
                </div>

      <div className="section" style={{ textAlign: "center", color: "var(--ink-4)", fontFamily: "var(--font-mono)", fontSize: 11 }}>
        {fmtN(ov.reactions)} reactions · {fmtN(ov.with_attachments)} messages with attachments
        {ov.total_handles != null && <> · {fmtN(ov.total_handles)} unique handles</>}
      </div>
    </ChatScope.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
